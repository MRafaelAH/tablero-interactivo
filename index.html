<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero Interactivo</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; background-color: #000000; font-family: sans-serif; color: white; overflow: hidden; }
        
        /* Barra Lateral Izquierda */
        #sidebar { 
            width: 280px; 
            background: #111; 
            border-right: 1px solid #333; 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto;
            padding: 15px;
            z-index: 10;
        }

        #tree-container { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }

        .item { 
            padding: 12px; 
            background: #222; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 13px;
            border: 1px solid #333;
            transition: 0.2s;
        }

        .item:hover { background: #333; border-color: #444; color: #3498db; }

        /* Visor 3D */
        #viewer-container { flex-grow: 1; position: relative; background-color: #000000; }
        
        model-viewer { 
            width: 100%; 
            height: 100%; 
            background-color: #000000; /* Fondo Negro Plano */
        }

        .controls { position: absolute; bottom: 20px; right: 20px; }
        button { padding: 12px 20px; cursor: pointer; background: #222; color: white; border: 1px solid #444; border-radius: 6px; font-weight: bold; }
        button:hover { background: #333; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="margin:0; font-size: 1.2rem; color: #3498db;">Componentes</h2>
        <div id="tree-container">Cargando árbol...</div>
    </div>

    <div id="viewer-container">
        <model-viewer 
            id="tablero" 
            src="Tablero.glb" 
            ar 
            camera-controls 
            touch-action="pan-y"
            shadow-intensity="1"
            exposure="1.2">
            
            <div class="controls">
                <button onclick="resetView()">Ver Todo</button>
            </div>
        </model-viewer>
    </div>

    <script>
        const viewer = document.querySelector("#tablero");
        const container = document.querySelector("#tree-container");

        viewer.addEventListener("load", () => {
            container.innerHTML = ""; 
            
            const materiales = viewer.model.materials;
            
            // Creamos la lista basada en los materiales del modelo
            materiales.forEach((mat) => {
                if (mat.name && mat.name !== "Default" && !mat.name.includes("material")) {
                    const btn = document.createElement("div");
                    btn.className = "item";
                    btn.innerText = "⚡ " + mat.name;
                    
                    btn.onclick = () => {
                        materiales.forEach(m => {
                            m.setAlphaMode("BLEND");
                            if (m.name === mat.name) {
                                m.setBaseColorFactor([1, 1, 1, 1]); // Resaltar
                            } else {
                                m.setBaseColorFactor([1, 1, 1, 0.05]); // Casi invisible
                            }
                        });
                    };
                    container.appendChild(btn);
                }
            });

            if (container.innerHTML === "") {
                container.innerHTML = "<p style='color: #888;'>No se encontraron nombres de materiales. Intenta tocar el modelo directamente.</p>";
            }
        });

        // Evento para cuando tocas el 3D directamente
        viewer.addEventListener("click", (event) => {
            const hit = viewer.sampleRenderScale(event.clientX, event.clientY);
            if (hit) {
                // Esto ayuda a depurar nombres en la consola del navegador (F12)
                console.log("Pieza tocada:", hit.nodeName);
            }
        });

        function resetView() {
            viewer.model.materials.forEach(m => {
                m.setAlphaMode("OPAQUE");
                m.setBaseColorFactor([1, 1, 1, 1]);
            });
        }
    </script>
</body>
</html>
