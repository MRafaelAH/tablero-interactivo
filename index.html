<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero Interactivo - Contraste Alto</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; background-color: #000; font-family: sans-serif; color: white; overflow: hidden; }
        #sidebar { width: 280px; background: #111; border-right: 1px solid #333; display: flex; flex-direction: column; overflow-y: auto; padding: 15px; }
        #tree-container { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
        .item { padding: 12px; background: #222; border-radius: 6px; cursor: pointer; font-size: 13px; border: 1px solid #333; }
        #viewer-container { flex-grow: 1; position: relative; background-color: #000; }
        
        model-viewer { 
            width: 100%; height: 100%; 
            background-color: #000;
        }

        .controls { position: absolute; bottom: 20px; right: 20px; }
        button { padding: 12px 20px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="margin:0; font-size: 1.1rem; color: #3498db;">Lista de Componentes</h2>
        <div id="tree-container">Cargando...</div>
    </div>

    <div id="viewer-container">
        <model-viewer 
            id="tablero" 
            src="Tablero.glb" 
            ar camera-controls 
            touch-action="pan-y"
            
            /* AJUSTES AGRESIVOS DE LUZ */
            shadow-intensity="10" 
            shadow-softness="0"
            exposure="0.3" 
            environment-image="neutral"
            orbit-sensitivity="1">
            
            <div class="controls">
                <button onclick="resetView()">RESET VER TODO</button>
            </div>
        </model-viewer>
    </div>

    <script>
        const viewer = document.querySelector("#tablero");
        const container = document.querySelector("#tree-container");

        viewer.addEventListener("load", () => {
            container.innerHTML = ""; 
            const materiales = viewer.model.materials;
            
            materiales.forEach((mat) => {
                if (mat.name && mat.name !== "Default") {
                    const btn = document.createElement("div");
                    btn.className = "item";
                    btn.innerText = "📍 " + mat.name;
                    btn.onclick = () => {
                        materiales.forEach(m => {
                            m.setAlphaMode("BLEND");
                            m.setBaseColorFactor(m.name === mat.name ? [1, 1, 1, 1] : [1, 1, 1, 0.05]);
                        });
                    };
                    container.appendChild(btn);
                }
            });
        });

        function resetView() {
            viewer.model.materials.forEach(m => {
                m.setAlphaMode("OPAQUE");
                m.setBaseColorFactor([1, 1, 1, 1]);
            });
        }
    </script>
</body>
</html>
