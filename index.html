<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero Interactivo</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; background-color: #1a1a1a; font-family: sans-serif; color: white; }
        
        /* Barra Lateral Izquierda */
        #sidebar { 
            width: 280px; 
            background: #252525; 
            border-right: 1px solid #444; 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto;
            padding: 10px;
        }

        #tree-container { display: flex; flex-direction: column; gap: 5px; }

        .item { 
            padding: 10px; 
            background: #333; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 13px;
            border: 1px solid transparent;
        }

        .item:hover { background: #444; border-color: #555; }

        /* Visor 3D */
        #viewer-container { flex-grow: 1; position: relative; }
        
        model-viewer { 
            width: 100%; 
            height: 100%; 
            --poster-color: transparent;
            background-color: #1a1a1a; /* Fondo Plano y Oscuro */
        }

        .controls { position: absolute; bottom: 20px; right: 20px; }
        button { padding: 10px; cursor: pointer; background: #444; color: white; border: 1px solid #666; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3 style="margin-top:0">Componentes</h3>
        <div id="tree-container">Buscando piezas...</div>
    </div>

    <div id="viewer-container">
        <model-viewer 
            id="tablero" 
            src="Tablero.glb" 
            ar 
            camera-controls 
            touch-action="pan-y"
            shadow-intensity="1"
            exposure="1">
            
            <div class="controls">
                <button onclick="resetView()">Ver Todo el Tablero</button>
            </div>
        </model-viewer>
    </div>

    <script>
        const viewer = document.querySelector("#tablero");
        const container = document.querySelector("#tree-container");

        viewer.addEventListener("load", () => {
            container.innerHTML = ""; // Limpiar texto de espera
            
            // Recorremos todos los materiales del modelo para crear la lista
            const materiales = viewer.model.materials;
            
            materiales.forEach((mat) => {
                // Filtramos nombres genéricos que no sirven
                if (mat.name && mat.name !== "Default" && mat.name !== "") {
                    const btn = document.createElement("div");
                    btn.className = "item";
                    btn.innerText = "📦 " + mat.name;
                    
                    btn.onclick = () => {
                        // Al hacer clic: Todo transparente menos esta pieza
                        materiales.forEach(m => {
                            m.setAlphaMode("BLEND");
                            if (m.name === mat.name) {
                                m.setBaseColorFactor([1, 1, 1, 1]); // Opaco
                            } else {
                                m.setBaseColorFactor([1, 1, 1, 0.1]); // Fantasma
                            }
                        });
                    };
                    container.appendChild(btn);
                }
            });

            if (container.innerHTML === "") {
                container.innerHTML = "No se detectaron nombres de piezas. Revisa el exportado de Inventor.";
            }
        });

        function resetView() {
            viewer.model.materials.forEach(m => {
                m.setBaseColorFactor([1, 1, 1, 1]);
            });
        }
    </script>
</body>
</html>
