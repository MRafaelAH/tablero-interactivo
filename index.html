<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero Interactivo Eterno</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
    body { margin: 0; }
    model-viewer { 
        width: 100vw;   /* 100% del ancho de la pantalla */
        height: 100vh;  /* 100% del alto de la pantalla */
        background-color: #444; /* Un fondo oscuro para que resalte el tablero */
    }
    #controles { 
        position: absolute; 
        top: 20px; 
        left: 20px; 
        z-index: 10; /* Para que siempre esté arriba */
        background: rgba(255,255,255,0.8); 
        padding: 15px; 
        border-radius: 10px; 
    }
</style>
</head>
<body>

    <div id="controles">
        <small>Toca un componente para resaltar sus cables</small><br>
        <button onclick="resetear()">Ver Todo</button>
    </div>

    <model-viewer id="tablero" src="Tablero.glb" camera-controls touch-action="pan-y" shadow-intensity="1" ar>
    </model-viewer>

    <script>
        const viewer = document.querySelector("#tablero");

        // AQUÍ ESTÁ TU DICCIONARIO (Edita esto según tus números de cable)
        const relaciones = {
            "Contactor_K1": ["Cable_101", "Cable_102", "Cable_103"],
            "Termico_F1": ["Cable_201", "Cable_202"],
            "Relay_R1": ["Cable_50", "Cable_51"]
        };

        viewer.addEventListener("click", (event) => {
            const hit = viewer.sampleRenderScale(event.clientX, event.clientY);
            if (hit) {
                const nombrePieza = hit.nodeName; // Nombre que traes de Inventor
                resaltar(nombrePieza);
            }
        });

        function resaltar(nombre) {
            const modelo = viewer.model;
            // Primero ponemos TODO transparente (fantasma)
            modelo.materials.forEach(mat => mat.setAlphaMode("BLEND"));
            modelo.materials.forEach(mat => mat.setBaseColorFactor([1, 1, 1, 0.1]));

            // Buscamos si la pieza tocada tiene cables asociados en el diccionario
            const cablesAsociados = relaciones[nombre] || [];
            
            // Resaltamos la pieza tocada y sus cables
            const piezasAResaltar = [nombre, ...cablesAsociados];
            
            piezasAResaltar.forEach(p => {
                const material = modelo.getMaterialByName(p); // Importante: Nombre en Inventor = Nombre Material
                if(material) material.setBaseColorFactor([1, 1, 1, 1]);
            });
        }

        function resetear() {
            viewer.model.materials.forEach(mat => mat.setBaseColorFactor([1, 1, 1, 1]));
        }
    </script>
</body>

</html>
