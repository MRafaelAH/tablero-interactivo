<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero Interactivo - Pro</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #3498db; }
        body { margin: 0; display: flex; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; overflow: hidden; }
        
        /* Barra Lateral (Árbol de Componentes) */
        #sidebar { 
            width: 300px; background: #f8f9fa; border-right: 1px solid #ddd; 
            display: flex; flex-direction: column; padding: 15px; overflow-y: auto;
        }
        #sidebar h2 { font-size: 1.2rem; color: var(--primary-color); border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; }
        .component-item { 
            padding: 8px 12px; margin: 4px 0; background: white; border-radius: 4px; 
            cursor: pointer; border: 1px solid #eee; transition: 0.2s; font-size: 0.9rem;
        }
        .component-item:hover { background: #e1f5fe; border-color: var(--accent-color); }

        /* Contenedor del Visor 3D */
        #viewer-container { flex-grow: 1; position: relative; background: #333; }
        model-viewer { width: 100%; height: 100%; }

        #controls { position: absolute; bottom: 20px; right: 20px; }
        button { padding: 10px 20px; cursor: pointer; background: var(--accent-color); color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Componentes</h2>
        <div id="tree-container">Cargando árbol...</div>
    </div>

    <div id="viewer-container">
        <model-viewer 
            id="tablero" 
            src="TABLERO.glb" 
            ar camera-controls 
            environment-image="legacy" 
            exposure="1.2" 
            shadow-intensity="1.5">
            
            <div id="controls">
                <button onclick="resetView()">Ver Todo</button>
            </div>
        </model-viewer>
    </div>

    <script>
        const viewer = document.querySelector("#tablero");
        const treeContainer = document.querySelector("#tree-container");

        // 1. ESCUCHAR CUANDO EL MODELO CARGA PARA CREAR EL ÁRBOL
        viewer.addEventListener("load", () => {
            const model = viewer.model;
            treeContainer.innerHTML = ""; // Limpiar mensaje de carga

            // Obtenemos todos los materiales/nodos que tienen nombre
            model.materials.forEach((material) => {
                if (material.name && material.name !== "Default") {
                    const div = document.createElement("div");
                    div.className = "component-item";
                    div.innerText = "🔌 " + material.name;
                    
                    // Al hacer clic en la lista, resalta en el 3D
                    div.onclick = () => resaltarPieza(material.name);
                    treeContainer.appendChild(div);
                }
            });
        });

        function resaltarPieza(nombre) {
            viewer.model.materials.forEach(mat => {
                mat.setAlphaMode("BLEND");
                if (mat.name === nombre) {
                    mat.setBaseColorFactor([1, 1, 1, 1]); // Opaco
                } else {
                    mat.setBaseColorFactor([1, 1, 1, 0.1]); // Transparente
                }
            });
        }

        function resetView() {
            viewer.model.materials.forEach(mat => {
                mat.setBaseColorFactor([1, 1, 1, 1]);
            });
        }
    </script>
</body>
</html>
